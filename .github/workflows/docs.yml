name: docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'generated/mmg-api.json'
      - 'scripts/gen_docs_api.py'
      - 'scripts/gen_js.py'
      - 'scripts/mmg_overrides.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install -r docs/requirements.txt

      # Regenerate the API reference from the committed descriptor so the site
      # cannot drift. (Does not require the mmg submodule or emsdk.)
      - name: Generate API reference
        run: python3 scripts/gen_docs_api.py

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
