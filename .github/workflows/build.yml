name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish step: dry-run only (verifies NPM_TOKEN + package contents, does not publish)'
        type: boolean
        default: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Pinned Emscripten SDK (keyed on the pinned version in scripts/env.sh).
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: .emsdk
          key: emsdk-${{ runner.os }}-${{ hashFiles('scripts/env.sh', 'scripts/setup-emsdk.sh') }}

      - name: Setup emsdk
        run: bash scripts/setup-emsdk.sh

      - name: Build mmg WASM + assemble dist
        run: bash scripts/build-wasm.sh

      - name: Verify generated bindings are in sync
        run: |
          bash scripts/gen-bindings.sh
          git diff --exit-code generated/ \
            || (echo "generated/ is stale — re-run scripts/gen-bindings.sh and commit" && exit 1)

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Test (Node)
        run: npm test

      - name: Test (browser)
        run: |
          npx playwright install --with-deps chromium
          npm run test:browser

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build-test
    # Real publish on a pushed version tag (e.g. v0.1.0); manual runs default
    # to a dry-run so NPM_TOKEN + package contents can be verified on demand.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (build attestation)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # npm >= 10, needed for --provenance
          registry-url: 'https://registry.npmjs.org'

      # Reuse the dist/ built and tested by the build-test job (build once).
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify NPM_TOKEN authenticates
        run: |
          npm whoami --registry=https://registry.npmjs.org \
            || { echo "::error::npm whoami failed -- NPM_TOKEN secret is missing, expired, or lacks publish rights for this account."; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify the git tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG_VERSION package.json=$PKG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION" \
            || { echo "::error::tag v$TAG_VERSION does not match package.json version $PKG_VERSION"; exit 1; }

      - name: Sanity-check the artifact
        run: |
          test -f dist/mmg-core.wasm || { echo "::error::dist/mmg-core.wasm missing"; exit 1; }
          test -f dist/mmg.mjs && test -f dist/mmg.cjs && test -f dist/mmg.d.ts

      # Real publish only on a version tag. A manual (workflow_dispatch) run
      # defaults to --dry-run, which exercises auth + packing without
      # publishing -- use it to confirm NPM_TOKEN works after rotating it.
      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::Dry run -- not publishing. Re-run with dry_run=false, or push a vX.Y.Z tag, to publish for real."
            npm publish --access public --dry-run
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
