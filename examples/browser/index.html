<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>mmg-wasm — browser example</title>
</head>
<body>
  <h1>mmg-wasm in the browser</h1>
  <pre id="result">running…</pre>

  <script type="module">
    // Import the published ESM entry directly; the .wasm is fetched as an asset.
    import initialize from '../../dist/mmg.mjs';

    const out = document.getElementById('result');
    try {
      const api = await initialize();
      const { mmg3d } = api;

      // Two-material cube (from mmg's adaptation_example0/example0_b).
      const verts = [
        [0, 0, 0], [0.5, 0, 0], [0.5, 0, 1], [0, 0, 1],
        [0, 1, 0], [0.5, 1, 0], [0.5, 1, 1], [0, 1, 1],
        [1, 0, 0], [1, 1, 0], [1, 0, 1], [1, 1, 1],
      ];
      const tetra = [
        [1, 4, 2, 8, 1], [8, 3, 2, 7, 1], [5, 2, 6, 8, 1], [5, 8, 1, 2, 1],
        [7, 2, 8, 6, 1], [2, 4, 3, 8, 1], [9, 2, 3, 7, 2], [7, 11, 9, 12, 2],
        [6, 9, 10, 7, 2], [6, 7, 2, 9, 2], [12, 9, 7, 10, 2], [9, 3, 11, 7, 2],
      ];
      const tria = [
        [1, 4, 8, 3], [1, 2, 4, 3], [8, 3, 7, 3], [5, 8, 6, 3], [5, 6, 2, 3],
        [5, 2, 1, 3], [5, 1, 8, 3], [7, 6, 8, 3], [4, 3, 8, 3], [2, 3, 4, 3],
        [9, 3, 2, 4], [11, 9, 12, 4], [7, 11, 12, 4], [6, 7, 10, 4],
        [6, 10, 9, 4], [6, 9, 2, 4], [12, 10, 7, 4], [12, 9, 10, 4],
        [3, 11, 7, 4], [9, 11, 3, 4],
      ];

      const h = mmg3d.init();
      mmg3d.setIparameter(h.mesh, h.met, mmg3d.IPARAM_verbose, -1);
      mmg3d.setMeshSize(h.mesh, verts.length, tetra.length, 0, tria.length, 0, 0);
      verts.forEach(([x, y, z], i) => mmg3d.setVertex(h.mesh, x, y, z, 0, i + 1));
      tetra.forEach(([a, b, c, d, ref], i) =>
        mmg3d.setTetrahedron(h.mesh, a, b, c, d, ref, i + 1));
      tria.forEach(([a, b, c, ref], i) =>
        mmg3d.setTriangle(h.mesh, a, b, c, ref, i + 1));
      mmg3d.setDparameter(h.mesh, h.met, mmg3d.DPARAM_hausd, 0.1);

      mmg3d.remesh(h.mesh, h.met);
      const { np, ne } = mmg3d.getMeshSize(h.mesh);
      mmg3d.free(h);

      // Signal success to both humans and the headless test harness.
      out.textContent = `OK: remeshed cube — ${np} vertices, ${ne} tetrahedra`;
      out.dataset.nodes = String(np);
      out.dataset.status = 'ok';
    } catch (err) {
      out.textContent = 'ERROR: ' + (err && err.message || err);
      out.dataset.status = 'error';
    }
  </script>
</body>
</html>
